<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <!-- Red gradient for accent elements -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E10600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff2010;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle glow filter -->
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip path for the slash cut on the badge -->
    <clipPath id="badgeClip">
      <polygon points="0,0 340,0 360,160 20,160"/>
    </clipPath>
  </defs>

  <!-- Background badge — parallelogram shape -->
  <polygon
    points="8,8 348,8 372,152 32,152"
    fill="#0d0d0d"
    stroke="rgba(255,255,255,0.07)"
    stroke-width="1"
  />

  <!-- Red top-left corner accent bar -->
  <polygon
    points="8,8 80,8 60,32 8,32"
    fill="#E10600"
  />

  <!-- Red bottom-right corner accent -->
  <polygon
    points="320,128 372,128 372,152 300,152"
    fill="#E10600"
    opacity="0.7"
  />

  <!-- Diagonal speed slash behind text -->
  <polygon
    points="185,12 205,12 195,148 175,148"
    fill="rgba(225,6,0,0.08)"
  />
  <polygon
    points="200,12 204,12 194,148 190,148"
    fill="rgba(225,6,0,0.15)"
  />

  <!-- Main wordmark: FJ -->
  <text
    x="38"
    y="118"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="96"
    fill="white"
    letter-spacing="-4"
    font-style="italic"
  >FJ</text>

  <!-- Main wordmark: UAN — red -->
  <text
    x="188"
    y="118"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="96"
    fill="#E10600"
    letter-spacing="-4"
    font-style="italic"
    filter="url(#redGlow)"
  >UAN</text>

  <!-- Thin horizontal rule below text -->
  <line x1="32" y1="130" x2="365" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Tagline -->
  <text
    x="38"
    y="147"
    font-family="'Arial', sans-serif"
    font-weight="700"
    font-size="10"
    fill="rgba(255,255,255,0.3)"
    letter-spacing="4"
  >FORMULA 1 · ANALYTICS</text>

  <!-- Top right: small season label -->
  <text
    x="310"
    y="28"
    font-family="'Arial', sans-serif"
    font-weight="700"
    font-size="9"
    fill="rgba(255,255,255,0.25)"
    letter-spacing="2"
    text-anchor="middle"
  >2026</text>

</svg>
